name: Backend CI/CD

on:
  push:
    branches: [main, development, dev, ci-cd/sewmi]
  pull_request:
    branches: [ "development" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Build Docker Image
        run: docker build -t grocery-user-payment-service .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag grocery-user-payment-service ${{ secrets.DOCKER_USERNAME }}/grocery-user-payment-service:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/grocery-user-payment-service:latest